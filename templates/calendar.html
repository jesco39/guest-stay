{{template "layout" .}}
{{define "content"}}
<div class="card">
    <p class="hint">Tap a check-in date, then a check-out date.</p>

    <div id="selection" class="selection" style="display:none;">
        <p>Check-in: <strong id="sel-checkin"></strong></p>
        <p>Check-out: <strong id="sel-checkout"></strong></p>
        <a id="book-link" href="#" class="btn">Book These Dates</a>
    </div>

    {{range .Months}}{{template "month" .}}{{end}}

    <div id="cal-sentinel" data-next-month="{{.SentinelMonth}}" data-today="{{.Today}}"></div>

    <div class="legend">
        <span class="legend-item"><span class="swatch available"></span> Both available</span>
        <span class="legend-item"><span class="swatch jesse-away"></span> Jesse away</span>
        <span class="legend-item"><span class="swatch allison-away"></span> Allison away</span>
        <span class="legend-item"><span class="swatch blocked"></span> Unavailable</span>
    </div>

    <p class="text-center"><a href="/logout">Logout</a></p>
</div>

<script src="/static/calendar.js"></script>
{{end}}
