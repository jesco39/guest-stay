{{template "layout" .}}
{{define "content"}}
<div class="card">
    <h2>Request Submitted!</h2>
    <p>Thanks, <strong>{{.GuestName}}</strong>! Your booking request has been submitted.</p>
    <p>Check-in: <strong>{{.CheckIn}}</strong></p>
    <p>Check-out: <strong>{{.CheckOut}}</strong></p>
    <p>You'll receive an email at <strong>{{.GuestEmail}}</strong> once your request is reviewed.</p>
    <p><a href="/booking/{{.UUID}}" class="btn">Check Status</a></p>
    <p><a href="/calendar">&larr; Back to calendar</a></p>
</div>
{{end}}
